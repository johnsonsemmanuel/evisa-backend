; OPcache configuration for production (eVisa platform)
; Loaded by Dockerfile: COPY docker/php/opcache.ini /usr/local/etc/php/conf.d/opcache.ini

[opcache]
opcache.enable=1
opcache.enable_cli=0
; Disable for CLI (artisan commands)
opcache.memory_consumption=256
; MB — increase for large codebases
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.max_wasted_percentage=10
opcache.validate_timestamps=0
; NEVER recheck files in production (deploy handles this)
opcache.revalidate_freq=0
opcache.fast_shutdown=1
opcache.save_comments=1
; Required for annotations/attributes
opcache.jit=tracing
; PHP 8.x JIT (significant speedup for compute-heavy ops)
opcache.jit_buffer_size=100M
