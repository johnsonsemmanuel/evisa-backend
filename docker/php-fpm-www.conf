[www]
user = www-data
group = www-data
listen = 9000
listen.owner = www-data
listen.group = www-data
listen.mode = 0660
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500
request_terminate_timeout = 60
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong
clear_env = no
catch_workers_output = yes
decorate_workers_output = no
